name: Build Wiki Gate
on:
  push:
    branches: [master]
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build index.html with env gate
        env:
          WIKI_USER: ${{ secrets.WIKI_USERNAME }}
          WIKI_PASS: ${{ secrets.WIKI_PASSWORD }}
        run: bash .github/workflows/build.sh
      - name: Deploy to Pages branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout --orphan gh-pages
          git rm -rf .
          git add index.html
          echo "index.html" > .nojekyll
          git add .nojekyll
          git commit -m "deploy: build from $GITHUB_SHA"
          git push origin gh-pages --force
